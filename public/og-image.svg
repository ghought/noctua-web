<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d0b08"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0dca5"/>
      <stop offset="42%" stop-color="#c9a866"/>
      <stop offset="100%" stop-color="#755c27"/>
    </linearGradient>
    <radialGradient id="bg2" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#16130d"/>
      <stop offset="48%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="owlGold" x1="130" y1="80" x2="380" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0dca5"/>
      <stop offset="42%" stop-color="#c9a866"/>
      <stop offset="100%" stop-color="#755c27"/>
    </linearGradient>
    <filter id="softGold" x="-20%" y="-20%" width="140%" height="140%">

      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.79 0 0 0 0 0.66 0 0 0 0 0.40 0 0 0 0.28 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->

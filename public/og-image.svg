  <!-- Main headline — line 1 -->
  <text x="360" y="265" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" fill="#e8e6e0" font-style="italic">Your dreams are</text>
  <!-- Main headline — line 2 -->
  <text x="360" y="355" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" fill="#c9a866" font-style="italic">trying to tell you</text>
  <!-- Main headline — line 3 -->
  <text x="360" y="445" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" fill="#c9a866" font-style="italic">something.</text>

